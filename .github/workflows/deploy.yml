name: Deploy Ttobak

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_target:
        description: 'What to deploy'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - backend
          - frontend
          - infra
          - research-agent
          - whisper

env:
  AWS_REGION: ap-northeast-2
  AWS_ACCOUNT_ID: "180294183052"
  S3_BUCKET: ttobak-site-180294183052-ap-northeast-2
  CF_DISTRIBUTION: E3IFMH57E9UTB5
  RESEARCH_ECR_REPO: ttobak/research-agent
  WHISPER_ECR_REPO: ttobak-whisper
  AGENTCORE_RUNTIME_ID: ttobakDeepResearch-5vzwFf3Q5K

jobs:
  detect-changes:
    runs-on: self-hosted
    outputs:
      backend: ${{ steps.changes.outputs.backend }}
      frontend: ${{ steps.changes.outputs.frontend }}
      infra: ${{ steps.changes.outputs.infra }}
      crawler: ${{ steps.changes.outputs.crawler }}
      research_agent: ${{ steps.changes.outputs.research_agent }}
      whisper: ${{ steps.changes.outputs.whisper }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed paths
        id: changes
        env:
          EVENT_NAME: ${{ github.event_name }}
          DEPLOY_TARGET: ${{ github.event.inputs.deploy_target }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "backend=$( [ "$DEPLOY_TARGET" = 'all' ] || [ "$DEPLOY_TARGET" = 'backend' ] && echo true || echo false )" >> "$GITHUB_OUTPUT"
            echo "frontend=$( [ "$DEPLOY_TARGET" = 'all' ] || [ "$DEPLOY_TARGET" = 'frontend' ] && echo true || echo false )" >> "$GITHUB_OUTPUT"
            echo "infra=$( [ "$DEPLOY_TARGET" = 'all' ] || [ "$DEPLOY_TARGET" = 'infra' ] && echo true || echo false )" >> "$GITHUB_OUTPUT"
            echo "crawler=$( [ "$DEPLOY_TARGET" = 'all' ] || [ "$DEPLOY_TARGET" = 'backend' ] && echo true || echo false )" >> "$GITHUB_OUTPUT"
            echo "research_agent=$( [ "$DEPLOY_TARGET" = 'all' ] || [ "$DEPLOY_TARGET" = 'research-agent' ] && echo true || echo false )" >> "$GITHUB_OUTPUT"
            echo "whisper=$( [ "$DEPLOY_TARGET" = 'all' ] || [ "$DEPLOY_TARGET" = 'whisper' ] && echo true || echo false )" >> "$GITHUB_OUTPUT"
          else
            CHANGED=$(git diff --name-only HEAD~1 HEAD)
            echo "backend=$(echo "$CHANGED" | grep -q '^backend/' && echo true || echo false)" >> "$GITHUB_OUTPUT"
            echo "frontend=$(echo "$CHANGED" | grep -q '^frontend/' && echo true || echo false)" >> "$GITHUB_OUTPUT"
            echo "infra=$(echo "$CHANGED" | grep -q '^infra/' && echo true || echo false)" >> "$GITHUB_OUTPUT"
            echo "crawler=$(echo "$CHANGED" | grep -q '^backend/python/crawler/' && echo true || echo false)" >> "$GITHUB_OUTPUT"
            echo "research_agent=$(echo "$CHANGED" | grep -q '^backend/python/research-agent/' && echo true || echo false)" >> "$GITHUB_OUTPUT"
            echo "whisper=$(echo "$CHANGED" | grep -q '^backend/whisper/' && echo true || echo false)" >> "$GITHUB_OUTPUT"
          fi
          cat "$GITHUB_OUTPUT"

  build-backend:
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Build Go Lambda binaries (ARM64)
        working-directory: backend
        run: |
          for dir in cmd/api cmd/transcribe cmd/summarize cmd/process-image cmd/kb cmd/research-worker; do
            echo "Building $dir..."
            GOOS=linux GOARCH=arm64 /usr/local/go/bin/go build -tags lambda.norpc -o "$dir/bootstrap" "./$dir"
            echo "  OK: $dir"
          done

      - name: Run Go tests
        working-directory: backend
        run: /usr/local/go/bin/go test ./internal/... -count=1

  build-frontend:
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build static export
        working-directory: frontend
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-out
          path: frontend/out/
          retention-days: 1

  deploy-infra:
    needs: [detect-changes, build-backend]
    if: always() && (needs.detect-changes.outputs.infra == 'true' || needs.detect-changes.outputs.backend == 'true' || needs.detect-changes.outputs.crawler == 'true')
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Build Go binaries if backend changed
        if: needs.detect-changes.outputs.backend == 'true'
        working-directory: backend
        run: |
          for dir in cmd/api cmd/transcribe cmd/summarize cmd/process-image cmd/kb cmd/research-worker; do
            GOOS=linux GOARCH=arm64 /usr/local/go/bin/go build -tags lambda.norpc -o "$dir/bootstrap" "./$dir"
          done

      - name: Install CDK dependencies
        working-directory: infra
        run: npm ci

      - name: CDK diff
        working-directory: infra
        run: npx cdk diff 2>&1 || true

      - name: CDK deploy
        working-directory: infra
        run: npx cdk deploy --all --require-approval never

  build-whisper:
    needs: detect-changes
    if: needs.detect-changes.outputs.whisper == 'true'
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Build and push Whisper container (amd64 for g5.xlarge GPU)
        working-directory: backend/whisper
        run: |
          ECR_URI="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${WHISPER_ECR_REPO}"
          aws ecr get-login-password --region "${AWS_REGION}" | docker login --username AWS --password-stdin "${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          docker buildx build --platform linux/amd64 -t "${ECR_URI}:latest" -t "${ECR_URI}:${GITHUB_SHA::8}" --push .
          echo "Whisper image pushed: ${ECR_URI}:${GITHUB_SHA::8}"

  deploy-research-agent:
    needs: detect-changes
    if: needs.detect-changes.outputs.research_agent == 'true'
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Build and push research agent container (ARM64)
        working-directory: backend/python/research-agent
        run: |
          ECR_URI="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${RESEARCH_ECR_REPO}"
          aws ecr get-login-password --region "${AWS_REGION}" | docker login --username AWS --password-stdin "${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          docker buildx build --platform linux/arm64 -t "${ECR_URI}:latest" -t "${ECR_URI}:${GITHUB_SHA::8}" --push .

      - name: Update AgentCore Runtime
        run: |
          ECR_URI="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${RESEARCH_ECR_REPO}:${GITHUB_SHA::8}"
          aws bedrock-agentcore-control update-agent-runtime \
            --agent-runtime-id "${AGENTCORE_RUNTIME_ID}" \
            --role-arn "arn:aws:iam::${AWS_ACCOUNT_ID}:role/ttobak-agentcore-research-role" \
            --network-configuration '{"networkMode":"PUBLIC"}' \
            --agent-runtime-artifact "{\"containerConfiguration\":{\"containerUri\":\"${ECR_URI}\"}}"
          echo "AgentCore runtime updated with image: ${ECR_URI}"

  deploy-frontend:
    needs: [detect-changes, build-frontend, deploy-infra]
    if: always() && needs.detect-changes.outputs.frontend == 'true' && needs.build-frontend.result == 'success'
    runs-on: self-hosted
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-out
          path: frontend-out/

      - name: Deploy to S3 (sync with delete — content-hash filenames ensure safe swap)
        run: aws s3 sync frontend-out/ "s3://${S3_BUCKET}/" --delete

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${CF_DISTRIBUTION}" \
            --paths "/*"

  notify:
    needs: [deploy-infra, deploy-frontend, deploy-research-agent, build-whisper]
    if: always()
    runs-on: self-hosted
    steps:
      - name: Summary
        env:
          INFRA_RESULT: ${{ needs.deploy-infra.result }}
          FRONTEND_RESULT: ${{ needs.deploy-frontend.result }}
          RESEARCH_RESULT: ${{ needs.deploy-research-agent.result }}
          WHISPER_RESULT: ${{ needs.build-whisper.result }}
          REF_NAME: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
          EVENT: ${{ github.event_name }}
        run: |
          echo "## Deploy Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "| Component | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Infra | ${INFRA_RESULT:-skipped} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Frontend | ${FRONTEND_RESULT:-skipped} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Research Agent | ${RESEARCH_RESULT:-skipped} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Whisper STT | ${WHISPER_RESULT:-skipped} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Trigger | ${EVENT} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Branch | ${REF_NAME} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Commit | ${SHA} |" >> "$GITHUB_STEP_SUMMARY"
