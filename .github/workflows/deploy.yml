name: Deploy Ttobak

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_target:
        description: 'What to deploy'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - backend
          - frontend
          - infra
          - research-agent
          - whisper

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
  S3_BUCKET: ${{ vars.S3_BUCKET }}
  CF_DISTRIBUTION: ${{ vars.CF_DISTRIBUTION }}
  RESEARCH_ECR_REPO: ${{ vars.RESEARCH_ECR_REPO }}
  WHISPER_ECR_REPO: ${{ vars.WHISPER_ECR_REPO }}
  AGENTCORE_RUNTIME_ID: ${{ vars.AGENTCORE_RUNTIME_ID }}

jobs:
  # ─── Change Detection ───────────────────────────────────────────
  detect-changes:
    runs-on: ttobak-x86
    outputs:
      backend: ${{ steps.changes.outputs.backend }}
      frontend: ${{ steps.changes.outputs.frontend }}
      infra: ${{ steps.changes.outputs.infra }}
      research_agent: ${{ steps.changes.outputs.research_agent }}
      whisper: ${{ steps.changes.outputs.whisper }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed paths
        id: changes
        env:
          EVENT_NAME: ${{ github.event_name }}
          DEPLOY_TARGET: ${{ github.event.inputs.deploy_target }}
        run: |
          detect() {
            local name="$1" pattern="$2" targets="$3"
            if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
              for t in $targets; do
                if [ "$DEPLOY_TARGET" = "$t" ]; then echo "$name=true" >> "$GITHUB_OUTPUT"; return; fi
              done
              echo "$name=false" >> "$GITHUB_OUTPUT"
            else
              if echo "$CHANGED" | grep -q "$pattern"; then
                echo "$name=true" >> "$GITHUB_OUTPUT"
              else
                echo "$name=false" >> "$GITHUB_OUTPUT"
              fi
            fi
          }
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")
          detect backend        '^backend/'                       "all backend"
          detect frontend       '^frontend/'                      "all frontend"
          detect infra          '^infra/'                         "all infra backend"
          detect research_agent '^backend/python/research-agent/' "all research-agent"
          detect whisper        '^backend/whisper/'                "all whisper"
          cat "$GITHUB_OUTPUT"

  # ─── Build: Go Lambda Binaries (ARM native) ─────────────────────
  build-backend:
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    runs-on: ttobak-arm
    steps:
      - uses: actions/checkout@v4

      - name: Build Go Lambda binaries (ARM64 native)
        working-directory: backend
        run: |
          for dir in cmd/api cmd/transcribe cmd/summarize cmd/process-image cmd/kb cmd/research-worker; do
            echo "Building $dir..."
            GOOS=linux GOARCH=arm64 go build -tags lambda.norpc -o "$dir/bootstrap" "./$dir"
          done

      - name: Run Go tests
        working-directory: backend
        run: go test ./internal/... -count=1

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: lambda-binaries
          path: backend/cmd/*/bootstrap
          retention-days: 1

  # ─── Build: Frontend Static Export ──────────────────────────────
  build-frontend:
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    runs-on: ttobak-x86
    container:
      image: node:22-slim
    steps:
      - uses: actions/checkout@v4

      - name: Install and build
        working-directory: frontend
        run: npm ci && npm run build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-out
          path: frontend/out/
          retention-days: 1

  # ─── Build: Whisper Docker Image (amd64 native) ────────────────
  build-whisper:
    needs: detect-changes
    if: needs.detect-changes.outputs.whisper == 'true'
    runs-on: ttobak-x86
    steps:
      - uses: actions/checkout@v4

      - name: Build and push Whisper container
        working-directory: backend/whisper
        run: |
          ECR_URI="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${WHISPER_ECR_REPO}"
          aws ecr get-login-password --region "${AWS_REGION}" \
            | docker login --username AWS --password-stdin "${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          docker build -t "${ECR_URI}:latest" -t "${ECR_URI}:${GITHUB_SHA::8}" .
          docker push "${ECR_URI}:latest"
          docker push "${ECR_URI}:${GITHUB_SHA::8}"

  # ─── Deploy: CDK Infrastructure ─────────────────────────────────
  deploy-infra:
    needs: [detect-changes, build-backend]
    if: always() && (needs.detect-changes.outputs.infra == 'true' || needs.detect-changes.outputs.backend == 'true')
    runs-on: ttobak-arm
    steps:
      - uses: actions/checkout@v4

      - name: Download backend binaries
        if: needs.build-backend.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: lambda-binaries
          path: backend/cmd/

      - name: Build Go binaries (fallback if no artifact)
        if: needs.build-backend.result != 'success'
        working-directory: backend
        run: |
          for dir in cmd/api cmd/transcribe cmd/summarize cmd/process-image cmd/kb cmd/research-worker; do
            GOOS=linux GOARCH=arm64 go build -tags lambda.norpc -o "$dir/bootstrap" "./$dir"
          done

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: CDK deploy
        working-directory: infra
        run: |
          npm ci
          npx cdk diff 2>&1 || true
          npx cdk deploy --all --require-approval never

  # ─── Deploy: Research Agent (ARM64 native) ──────────────────────
  deploy-research-agent:
    needs: detect-changes
    if: needs.detect-changes.outputs.research_agent == 'true'
    runs-on: ttobak-arm
    steps:
      - uses: actions/checkout@v4

      - name: Build and push container
        working-directory: backend/python/research-agent
        run: |
          ECR_URI="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${RESEARCH_ECR_REPO}"
          aws ecr get-login-password --region "${AWS_REGION}" \
            | docker login --username AWS --password-stdin "${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          docker build -t "${ECR_URI}:latest" -t "${ECR_URI}:${GITHUB_SHA::8}" .
          docker push "${ECR_URI}:latest"
          docker push "${ECR_URI}:${GITHUB_SHA::8}"

      - name: Update AgentCore Runtime
        run: |
          ECR_URI="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${RESEARCH_ECR_REPO}:${GITHUB_SHA::8}"
          aws bedrock-agentcore-control update-agent-runtime \
            --agent-runtime-id "${AGENTCORE_RUNTIME_ID}" \
            --role-arn "arn:aws:iam::${AWS_ACCOUNT_ID}:role/ttobak-agentcore-research-role" \
            --network-configuration '{"networkMode":"PUBLIC"}' \
            --agent-runtime-artifact "{\"containerConfiguration\":{\"containerUri\":\"${ECR_URI}\"}}"

  # ─── Deploy: Frontend to S3 + CloudFront ────────────────────────
  deploy-frontend:
    needs: [detect-changes, build-frontend, deploy-infra]
    if: always() && needs.detect-changes.outputs.frontend == 'true' && needs.build-frontend.result == 'success'
    runs-on: ttobak-x86
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-out
          path: frontend-out/

      - name: Sync to S3
        run: aws s3 sync frontend-out/ "s3://${S3_BUCKET}/" --delete --exclude "config.json"

      - name: Invalidate CloudFront
        run: aws cloudfront create-invalidation --distribution-id "${CF_DISTRIBUTION}" --paths "/*"

  # ─── Notify ─────────────────────────────────────────────────────
  notify:
    needs: [build-backend, build-frontend, build-whisper, deploy-infra, deploy-frontend, deploy-research-agent]
    if: always()
    runs-on: ttobak-x86
    steps:
      - name: Summary
        run: |
          echo "## Deploy Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "| Component | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Backend Build | ${{ needs.build-backend.result || 'skipped' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Infra (CDK) | ${{ needs.deploy-infra.result || 'skipped' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Frontend | ${{ needs.deploy-frontend.result || 'skipped' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Research Agent | ${{ needs.deploy-research-agent.result || 'skipped' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Whisper STT | ${{ needs.build-whisper.result || 'skipped' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Trigger | ${{ github.event_name }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Commit | ${{ github.sha }} |" >> "$GITHUB_STEP_SUMMARY"
