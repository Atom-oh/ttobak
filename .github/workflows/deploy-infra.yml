name: Deploy Infrastructure

on:
  push:
    branches: [main]
    paths: ['infra/**', 'backend/cmd/**', 'backend/internal/**', 'backend/go.*']
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ttobak-arm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install AWS CLI
        run: |
          curl -s "https://awscli.amazonaws.com/awscli-exe-linux-aarch64.zip" -o /tmp/awscli.zip
          unzip -q /tmp/awscli.zip -d /tmp && /tmp/aws/install --install-dir $HOME/.local/aws-cli --bin-dir $HOME/.local/bin --update
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          aws --version

      - name: Build Go Lambda binaries
        working-directory: backend
        run: |
          for dir in cmd/api cmd/transcribe cmd/summarize cmd/process-image cmd/kb cmd/research-worker; do
            GOOS=linux GOARCH=arm64 go build -tags lambda.norpc -o "$dir/bootstrap" "./$dir"
          done

      - name: CDK deploy
        working-directory: infra
        run: |
          npm ci
          npx cdk diff 2>&1 || true
          npx cdk deploy --all --require-approval never
