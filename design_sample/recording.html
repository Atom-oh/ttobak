<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#3211d4",
              "background-light": "#f6f6f8",
              "background-dark": "#131022",
            },
            fontFamily: {
              "display": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<title>Meeting Recorder</title>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<header class="flex items-center justify-between px-6 py-4 bg-white/80 dark:bg-background-dark/80 backdrop-blur-md sticky top-0 z-10">
<button class="p-2 hover:bg-primary/10 rounded-full transition-colors">
<span class="material-symbols-outlined text-slate-700 dark:text-slate-300">arrow_back</span>
</button>
<h1 class="text-lg font-bold tracking-tight">Strategy Workshop</h1>
<button class="p-2 hover:bg-primary/10 rounded-full transition-colors text-primary">
<span class="material-symbols-outlined">settings</span>
</button>
</header>
<main class="flex-1 flex flex-col px-6 pt-8 pb-32">
<div class="flex flex-col items-center justify-center mb-12">
<div class="relative flex items-center justify-center mb-8">
<div class="absolute w-48 h-48 bg-primary/10 rounded-full animate-pulse"></div>
<div class="absolute w-40 h-40 bg-primary/20 rounded-full"></div>
<div class="z-10 bg-white dark:bg-slate-800 shadow-xl rounded-full w-32 h-32 flex items-center justify-center border-4 border-primary">
<span class="text-3xl font-bold text-primary">12:45</span>
</div>
</div>
<div class="flex gap-1 h-12 items-center mb-4">
<div class="w-1 bg-primary rounded-full h-4"></div>
<div class="w-1 bg-primary rounded-full h-8"></div>
<div class="w-1 bg-primary rounded-full h-12"></div>
<div class="w-1 bg-primary rounded-full h-6"></div>
<div class="w-1 bg-primary rounded-full h-10"></div>
<div class="w-1 bg-primary rounded-full h-4"></div>
<div class="w-1 bg-primary rounded-full h-9"></div>
<div class="w-1 bg-primary rounded-full h-5"></div>
<div class="w-1 bg-primary rounded-full h-11"></div>
<div class="w-1 bg-primary rounded-full h-7"></div>
</div>
<p class="text-slate-500 dark:text-slate-400 font-medium">Recording in progress...</p>
</div>
<div class="flex items-center justify-center gap-6 mb-12">
<button class="w-16 h-16 rounded-full border-2 border-slate-200 dark:border-slate-700 flex items-center justify-center hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">
<span class="material-symbols-outlined text-slate-700 dark:text-slate-300">pause</span>
</button>
<button class="w-20 h-20 rounded-full bg-primary flex items-center justify-center shadow-lg shadow-primary/40 hover:scale-105 transition-transform">
<span class="material-symbols-outlined text-white text-3xl">stop</span>
</button>
<button class="w-16 h-16 rounded-full bg-primary/10 flex items-center justify-center hover:bg-primary/20 transition-colors text-primary">
<span class="material-symbols-outlined">add_a_photo</span>
</button>
</div>
<section class="mt-4">
<div class="flex items-center justify-between mb-4">
<h2 class="text-base font-bold text-slate-800 dark:text-slate-200 uppercase tracking-wider text-xs">Recently Captured</h2>
<button class="text-primary text-sm font-semibold">View All</button>
</div>
<div class="grid grid-cols-3 gap-3">
<div class="relative group cursor-pointer">
<div class="aspect-square bg-slate-200 dark:bg-slate-800 rounded-lg overflow-hidden border border-slate-200 dark:border-slate-700">
<div class="w-full h-full bg-center bg-no-repeat bg-cover" data-alt="Whiteboard with colorful sticky notes and diagrams" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuAmQEv4BbOMXB09ABQzYD7CZ4nHyvOS31VLXlI0563rNvgohe8JKAbRRNJhUEpq6OCrhxf1caz2SvWR6T9J4eSYyKBQSek73piqilw2QE2-qowf6e6kbp3N93yikgYGS7UG7HFUczC_Bry49etypgkUM8XmzD8frWvxDZRfcBqF4ODdxMZD8YJ6EiyxEyBmqx95kvZafF0a5umrxzAB-tbz6lX4aOrcnhdnddfRAn_bqfF9PEmlTJYe2rhoiJ66Ec6KMiJJUarqY0g')"></div>
</div>
<span class="absolute bottom-1 right-1 bg-black/60 text-white text-[10px] px-1.5 rounded-sm">04:22</span>
</div>
<div class="relative group cursor-pointer">
<div class="aspect-square bg-slate-200 dark:bg-slate-800 rounded-lg overflow-hidden border border-slate-200 dark:border-slate-700">
<div class="w-full h-full bg-center bg-no-repeat bg-cover" data-alt="Laptop screen showing data visualization charts" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBNiWyU3ouXG0Ntm4lfhlOMsjaEccIh3rudTqZiQnatjB_6p13o2TQ-rt8MPp95Q85iS0kjvIAO6h8PNH7khFrUYI0UMVj_nsCnYkEeGOnI1KWwKqE4Pkiy375BESTzbGrlXwgSYkcWP2mTdq0esdl7jFYB8oP0Xi1IjKpJbFA2WM_8Ldr0pdZnzEDQ0iRzt5KWWVkBPjR24b7zlIlF1_FolYJiMPoAoS8JD7LlS354gSJOhlhjVKRoeiOrrX8UGbYcWRcdwPwVF0I')"></div>
</div>
<span class="absolute bottom-1 right-1 bg-black/60 text-white text-[10px] px-1.5 rounded-sm">08:15</span>
</div>
<div class="relative group cursor-pointer">
<div class="aspect-square bg-slate-200 dark:bg-slate-800 rounded-lg overflow-hidden border border-slate-200 dark:border-slate-700 flex flex-col items-center justify-center bg-primary/5 border-dashed">
<span class="material-symbols-outlined text-primary/40 text-3xl">upload_file</span>
<span class="text-[10px] font-medium text-primary/60 mt-1">Add File</span>
</div>
</div>
</div>
</section>
</main>
<nav class="fixed bottom-0 w-full bg-white dark:bg-slate-900 border-t border-slate-100 dark:border-slate-800 px-6 pb-6 pt-3 flex justify-between items-center z-20">
<a class="flex flex-col items-center gap-1 text-slate-400 dark:text-slate-500 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined">video_camera_front</span>
<span class="text-xs font-medium">Meetings</span>
</a>
<a class="flex flex-col items-center gap-1 text-primary" href="#">
<span class="material-symbols-outlined">mic</span>
<span class="text-xs font-medium">Record</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400 dark:text-slate-500 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined">description</span>
<span class="text-xs font-medium">Files</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400 dark:text-slate-500 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined">person</span>
<span class="text-xs font-medium">Profile</span>
</a>
</nav>
</body></html>
